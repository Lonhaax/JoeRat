name: Build Sender

on:
  push:
    branches:
      - 'build/**'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Read config from BuildConfig
      id: cfg
      run: |
        $content = Get-Content "csharpsender/CSharpSender/BuildConfig.cs" -Raw
        $wsUrl   = [regex]::Match($content, 'DefaultWsUrl\s*=\s*"([^"]+)"').Groups[1].Value
        $roomId  = [regex]::Match($content, 'DefaultRoomId\s*=\s*"([^"]+)"').Groups[1].Value
        $secret  = [regex]::Match($content, 'DefaultSecret\s*=\s*"([^"]+)"').Groups[1].Value
        $exeName = [regex]::Match($content, 'ExeName\s*=\s*"([^"]+)"').Groups[1].Value
        echo "ws_url=$wsUrl"   >> $env:GITHUB_OUTPUT
        echo "room_id=$roomId" >> $env:GITHUB_OUTPUT
        echo "secret=$secret"  >> $env:GITHUB_OUTPUT
        echo "exe_name=$exeName" >> $env:GITHUB_OUTPUT
        Write-Host "Server : $wsUrl"
        Write-Host "Room   : $roomId"
        Write-Host "Exe    : $exeName"

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore csharpsender/CSharpSender/CSharpSender.csproj

    - name: Build
      run: dotnet publish csharpsender/CSharpSender/CSharpSender.csproj -c Release -o build --self-contained true -r win-x64 -p:PublishSingleFile=true

    - name: Rename executable
      run: |
        if (Test-Path "build/CSharpSender.exe") {
          Rename-Item "build/CSharpSender.exe" "${{ steps.cfg.outputs.exe_name }}.exe"
        }

    - name: Create release and upload executable
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ steps.cfg.outputs.exe_name }}
        files: build/${{ steps.cfg.outputs.exe_name }}.exe
