name: Build Sender

on:
  workflow_dispatch:
    inputs:
      ws_url:
        description: 'WebSocket URL'
        required: true
        type: string
      room_id:
        description: 'Room ID'
        required: true
        type: string
      secret:
        description: 'Secret'
        required: true
        type: string
      exe_name:
        description: 'Executable Name'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
        
    - name: Update BuildConfig
      run: |
        $buildConfig = @"
        namespace CSharpSender;
        internal static class BuildConfig
        {
            public const string DefaultWsUrl  = "${{ github.event.inputs.ws_url }}";
            public const string DefaultRoomId = "${{ github.event.inputs.room_id }}";
            public const string DefaultSecret = "${{ github.event.inputs.secret }}";
            public const string ExeName       = "${{ github.event.inputs.exe_name }}";
        }
        "@
        $buildConfig | Out-File -FilePath "csharpsender/CSharpSender/BuildConfig.cs" -Encoding UTF8
        
    - name: Restore dependencies
      run: dotnet restore csharpsender/CSharpSender/CSharpSender.csproj
      
    - name: Build
      run: dotnet publish csharpsender/CSharpSender/CSharpSender.csproj -c Release -o build --self-contained true -r win-x64 -p:PublishSingleFile=true
      
    - name: Rename executable
      run: |
        if (Test-Path "build/CSharpSender.exe") {
          Rename-Item "build/CSharpSender.exe" "${{ github.event.inputs.exe_name }}.exe"
        }
        
    - name: Upload executable
      uses: actions/upload-artifact@v3
      with:
        name: ${{ github.event.inputs.exe_name }}
        path: build/${{ github.event.inputs.exe_name }}.exe
